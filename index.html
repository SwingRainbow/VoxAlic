<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warframe 状态监控</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="tabs">
    <button class="tab-btn active" data-tab="cycles">世界时间</button>
    <button class="tab-btn" data-tab="fissures">虚空裂缝</button>
    <button class="tab-btn" data-tab="timer">任务计时</button>
    <button class="tab-btn" data-tab="settings">设置</button>
  </div>

  <div id="tab-cycles" class="tab-content active">
    <div id="cycle-cards"></div>
  </div>

  <div id="tab-fissures" class="tab-content">
    <div class="filter-bar">
      <label>纪元:
        <select id="tier-filter"><option value="">全部</option></select>
      </label>
      <label>任务类型:
        <select id="type-filter"><option value="">全部</option></select>
      </label>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab-btn active" data-sub="normal">普通裂缝 (<span id="count-normal">0</span>)</button>
      <button class="sub-tab-btn" data-sub="hard">钢铁之路 (<span id="count-hard">0</span>)</button>
      <button class="sub-tab-btn" data-sub="storm">虚空风暴 (<span id="count-storm">0</span>)</button>
    </div>
    <div class="table-wrapper">
      <table id="fissure-table">
        <thead>
          <tr><th>纪元</th><th>节点名</th><th>星球/星域</th><th>任务类型</th><th>剩余时间</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="tab-settings" class="tab-content">
    <div class="settings-group">
      <div class="settings-item">
        <div class="settings-label">关闭窗口行为</div>
        <div class="settings-desc">点击 X 时最小化到托盘，不退出程序</div>
        <label class="toggle">
          <input type="checkbox" id="setting-close-to-tray" checked />
          <span class="toggle-slider"></span>
          <span class="toggle-text">最小化到托盘</span>
        </label>
      </div>
    </div>
  </div>

  <div id="tab-timer" class="tab-content">
    <div class="timer-container">
      <div class="timer-display">
        <div class="timer-digits" id="timer-digits">0:00</div>
        <div class="timer-status" id="timer-status">未启动</div>
      </div>

      <div class="timer-controls">
        <label class="timer-mode-label">模式:</label>
        <label class="timer-radio">
          <input type="radio" name="timer-mode" value="normal" checked />
          <span>普通</span>
        </label>
        <label class="timer-radio">
          <input type="radio" name="timer-mode" value="fissure" />
          <span>裂缝</span>
        </label>
      </div>

      <div class="timer-buttons">
        <button class="timer-btn start" id="btn-timer-start">开始</button>
        <button class="timer-btn stop" id="btn-timer-stop">暂停</button>
        <button class="timer-btn reset" id="btn-timer-reset">重置</button>
      </div>

      <div class="life-support-bar">
        <div class="ls-label">维生系统</div>
        <div class="ls-bar-track">
          <div class="ls-bar-fill" id="ls-bar-fill" style="width:100%"></div>
        </div>
        <div class="ls-pct" id="ls-pct">--</div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <button id="btn-refresh">立即刷新</button>
    <span id="status-text">等待首次加载...</span>
  </div>

  <script type="module" src="/src/main.ts" defer></script>
</body>
</html>
