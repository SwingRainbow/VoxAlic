<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订阅提醒</title>
  <style>
    :root {
      --np-bg: #FFFFF0;
      --np-bg2: #F5F5E8;
      --np-border: #D8D8C0;
      --np-text: #2a2a24;
      --np-dim: #6a6858;
      --np-gold: #C01E25;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    #np-root {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: var(--np-bg);
      border: 1px solid var(--np-border);
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,.55);
      overflow: hidden;
    }
    #np-header {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: var(--np-bg2);
      border-bottom: 1px solid var(--np-border);
      font-size: 13px; font-weight: 600; color: var(--np-text);
    }
    #np-header .np-h-title { display: flex; align-items: center; gap: 6px; }
    #np-clear {
      background: transparent;
      border: 1px solid var(--np-border);
      color: var(--np-dim);
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    #np-clear:hover { color: var(--np-text); border-color: var(--np-gold); }
    #np-list {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 6px;
    }
    #np-list::-webkit-scrollbar { width: 8px; }
    #np-list::-webkit-scrollbar-thumb { background: #d0d0c0; border-radius: 4px; }
    .np-empty {
      color: var(--np-dim);
      text-align: center;
      padding: 40px 12px;
      font-size: 13px;
    }
    .np-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      background: var(--np-bg2);
      border-left: 3px solid var(--np-border);
      cursor: pointer;
      transition: background .12s;
    }
    .np-item:hover { background: #EDEDD8; }
    .np-item.np-fissure { border-left-color: var(--np-gold); }
    .np-item.np-cycle   { border-left-color: var(--np-gold); }
    .np-item.np-arbitration { border-left-color: var(--np-gold); }
    .np-icon { font-size: 18px; line-height: 1.2; flex: 0 0 auto; }
    .np-body { flex: 1 1 auto; min-width: 0; }
    .np-title {
      font-size: 13px; font-weight: 600; color: var(--np-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .np-detail {
      font-size: 11.5px; color: var(--np-dim); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .np-time { font-size: 10.5px; color: var(--np-dim); flex: 0 0 auto; padding-top: 2px; }
  </style>
</head>
<body>
  <div id="np-root">
    <div id="np-header">
      <span class="np-h-title">🔔 订阅提醒</span>
      <button id="np-clear">清空</button>
    </div>
    <div id="np-list"></div>
  </div>
  <script type="module" src="/src/notify.ts"></script>
</body>
</html>
