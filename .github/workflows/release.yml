name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tauri build

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "v=$v" >> $env:GITHUB_OUTPUT

      - name: Extract release notes
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $notes = "VoxAlic v$v"
          if (Test-Path CHANGELOG.md) {
            $cl = Get-Content CHANGELOG.md -Raw
            $pat = "(?ms)^##\s+v" + [regex]::Escape($v) + "\s*\r?\n(.*?)(?=^##\s+v|\z)"
            $m = [regex]::Match($cl, $pat)
            if ($m.Success) {
              $body = $m.Groups[1].Value.Trim()
              if ($body) { $notes = $body }
            }
          }
          [System.IO.File]::WriteAllText("$PWD/release_notes.txt", $notes, (New-Object System.Text.UTF8Encoding($false)))
          Write-Host "=== release notes ==="
          Write-Host $notes

      - name: Sign installer
        shell: pwsh
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $exe = "src-tauri/target/release/bundle/nsis/VoxAlic_${v}_x64-setup.exe"
          $keyFile = "$env:TEMP\tauri_sign.key"
          [System.IO.File]::WriteAllText($keyFile, $env:TAURI_KEY)
          npx tauri signer sign -f $keyFile -p $env:TAURI_KEY_PASSWORD $exe
          Remove-Item $keyFile

      - name: List bundle output
        shell: pwsh
        run: |
          $dir = "src-tauri/target/release/bundle/nsis"
          Write-Host "=== NSIS bundle contents ==="
          Get-ChildItem $dir | ForEach-Object { Write-Host $_.Name }

      # ── GitHub release ──────────────────────────────────────────────────────
      - name: Generate GitHub latest.json
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $sig = (Get-Content "src-tauri/target/release/bundle/nsis/VoxAlic_${v}_x64-setup.exe.sig" -Raw).Trim()
          $notes = Get-Content release_notes.txt -Raw
          @{
            version  = $v
            notes    = $notes
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = "https://github.com/SwingRainbow/VoxAlic/releases/download/v${v}/VoxAlic_${v}_x64-setup.exe"
              }
            }
          } | ConvertTo-Json -Depth 5 | Out-File "latest.json" -Encoding utf8NoBOM

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoxAlic ${{ steps.ver.outputs.v }}
          body_path: release_notes.txt
          files: |
            src-tauri/target/release/bundle/nsis/VoxAlic_${{ steps.ver.outputs.v }}_x64-setup.exe
            src-tauri/target/release/bundle/nsis/VoxAlic_${{ steps.ver.outputs.v }}_x64-setup.exe.sig
            latest.json

      # ── Gitee mirror + release (CI fully owns the Gitee repo) ────────────────
      - name: Publish to Gitee
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $owner = "Swing_Rainbow"
          $repo = "vox-alic"
          $exe = "src-tauri/target/release/bundle/nsis/VoxAlic_${v}_x64-setup.exe"
          $sig = (Get-Content "$exe.sig" -Raw).Trim()
          $notes = Get-Content release_notes.txt -Raw

          # 1) Gitee latest.json — Gitee download URL + the CI build's signature.
          $json = @{
            version  = $v
            notes    = $notes
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = "https://gitee.com/$owner/$repo/releases/download/v$v/VoxAlic_${v}_x64-setup.exe"
              }
            }
          } | ConvertTo-Json -Depth 5
          [System.IO.File]::WriteAllText("$PWD/latest.json", $json, (New-Object System.Text.UTF8Encoding($false)))

          # 2) Mirror code + Gitee latest.json + tag to Gitee master (force; CI is sole writer).
          git config user.email "ci@voxalic"
          git config user.name "VoxAlic CI"
          git add latest.json
          git commit -m "chore: gitee latest.json v$v"
          $giteeUrl = "https://${owner}:${env:GITEE_TOKEN}@gitee.com/$owner/$repo.git"
          git push --force $giteeUrl HEAD:master
          git push --force $giteeUrl "v$v"

          # 3) Create the Gitee release (UTF-8 form-encode to avoid mojibake).
          $name = [System.Uri]::EscapeDataString("VoxAlic v$v")
          $body = [System.Uri]::EscapeDataString($notes)
          $payload = "access_token=$env:GITEE_TOKEN&tag_name=v$v&name=$name&body=$body&target_commitish=master"
          $rel = Invoke-RestMethod -Method Post -Uri "https://gitee.com/api/v5/repos/$owner/$repo/releases" -Body $payload -ContentType "application/x-www-form-urlencoded"
          Write-Host "Gitee release id: $($rel.id)"

          # 4) Upload the installer as a release attachment.
          curl.exe -s -X POST "https://gitee.com/api/v5/repos/$owner/$repo/releases/$($rel.id)/attach_files" -F "access_token=$env:GITEE_TOKEN" -F "file=@$exe"
          Write-Host "Gitee publish done."
