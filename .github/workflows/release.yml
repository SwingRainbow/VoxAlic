name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tauri build

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "v=$v" >> $env:GITHUB_OUTPUT

      - name: Sign installer
        shell: pwsh
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $exe = "src-tauri/target/release/bundle/nsis/VoxAlic_${v}_x64-setup.exe"
          $keyFile = "$env:TEMP\tauri_sign.key"
          [System.IO.File]::WriteAllText($keyFile, $env:TAURI_KEY)
          npx tauri signer sign -f $keyFile -p $env:TAURI_KEY_PASSWORD $exe
          Remove-Item $keyFile

      - name: List bundle output
        shell: pwsh
        run: |
          $dir = "src-tauri/target/release/bundle/nsis"
          Write-Host "=== NSIS bundle contents ==="
          Get-ChildItem $dir | ForEach-Object { Write-Host $_.Name }

      - name: Generate latest.json
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.v }}"
          $sig = (Get-Content "src-tauri/target/release/bundle/nsis/VoxAlic_${v}_x64-setup.exe.sig" -Raw).Trim()
          @{
            version  = $v
            notes    = "VoxAlic v$v"
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig
                url = "https://github.com/SwingRainbow/VoxAlic/releases/download/v${v}/VoxAlic_${v}_x64-setup.exe"
              }
            }
          } | ConvertTo-Json -Depth 5 | Out-File "latest.json" -Encoding utf8NoBOM

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VoxAlic ${{ steps.ver.outputs.v }}
          files: |
            src-tauri/target/release/bundle/nsis/VoxAlic_${{ steps.ver.outputs.v }}_x64-setup.exe
            src-tauri/target/release/bundle/nsis/VoxAlic_${{ steps.ver.outputs.v }}_x64-setup.exe.sig
            latest.json
